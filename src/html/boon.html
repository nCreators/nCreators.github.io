<!DOCTYPE html>

		<script>
			function wclose() {
				window.close();
				clearTimeout(id);
			}
			id = window.setTimeout("wclose()", 800);
			window.onload = function() {
				setInterval(function() {
					window.moveBy(getRandomInt(10, 100), getRandomInt(5, 50));
				}, 10);
			}
			function getRandomInt(min, max) {
				min = Math.ceil(min);
				max = Math.floor(max);
				return Math.floor(Math.random() * (max - min) + min);
			}
		</script>
